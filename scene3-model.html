<!doctype html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <title>MODEL 3D GLTF/GLB</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>

</head>

<body>


    <a-scene>
        <a-entity environment="preset: yavapai; ground: flat; fog: 0.6"></a-entity>
        <a-assets>
            <a-asset-item id="modelUtama" src="assets/model.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#B05020"></a-sky>

        <!--Nilai scale pada objek digunakan untuk menyesuaikan ukuran objek pada environment agar tidak terlalu besar dan tidak terlalu kecil  -->
        <a-entity gltf-model="#modelUtama" position="1   0.15 -4" scale="0.1 0.1 0.1" class="clickable"
            animation__click="property: rotation; to: 0 360 0; startEvents: click; dur: 2000"></a-entity>

        <a-light type="ambient" color="#FFFFFF" intensity="1.4"></a-light>
        <a-light type="directional" color="#FFF5E6" intensity="1.2" position="-1 3 1"></a-light>

        <a-link href="index.html" title="Kembali" position="8 1 -5" class="clickable"></a-link>

        <a-camera position="0 1.6 5" wasd-controls="fly: false">
            <a-cursor color="#FFFFFF" fuse="true" fuse-timeout="1500" raycaster="objects: .clickable"></a-cursor>
        </a-camera>
    </a-scene>
</body>

</html>
